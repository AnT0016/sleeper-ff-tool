name: Weekly data refresh

# Rebuilds data_cache/season.db (the hosted dashboard's only data source) and commits it back to the
# repo. Streamlit Community Cloud auto-redeploys whenever the committed artifact changes.
#
# Schedule: cron is UTC. We target Tuesday evening CEST -- after the week's games settle and before
# waivers clear Wednesday 09:00 CEST. 18:00 UTC Tue = 20:00 CEST / 19:00 CET (best-effort; GitHub may
# delay cron jobs under load). Use the manual "Run workflow" button for off-season / ad-hoc runs.
on:
  schedule:
    - cron: "0 18 * * 2"   # Tuesday 18:00 UTC -> ~Tuesday evening CEST/CET
  workflow_dispatch:
    inputs:
      week:
        description: "NFL week (1-18). Leave blank to auto-detect the current week."
        required: false
        type: string
      season:
        description: "Season year. Leave blank to auto-detect the current season."
        required: false
        type: string

# Allow the job's GITHUB_TOKEN to push the refreshed artifact back to the repo.
permissions:
  contents: write

# Never let two refreshes race to commit the same file.
concurrency:
  group: weekly-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Rebuild season snapshot
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.week }}" ]; then ARGS="$ARGS --week ${{ github.event.inputs.week }}"; fi
          if [ -n "${{ github.event.inputs.season }}" ]; then ARGS="$ARGS --season ${{ github.event.inputs.season }}"; fi
          echo "Running: scripts/refresh_data.py $ARGS"
          python scripts/refresh_data.py $ARGS

      - name: Commit updated data (no-op safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_cache/season.db
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): weekly season snapshot refresh"
            git push
          fi
